<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<title>استبيان - نادي إتقان التلاوة</title>
</head>

<body class="bg-light text-center">

<!-- HEADER (same style as index) -->
<header class="bg-white">
<div class="container-fluid">

    <nav class="navbar navbar-expand-sm float-start">
        <ul class="nav navbar-tabs">
            <li class="nav-item"><a href="about.html" class="nav-link text-secondary fw-bold">حول</a></li>
            <li class="nav-item"><a href="index.html" class="nav-link text-secondary fw-bold">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="float-end">
        <img src="images/logo.png" class="rounded float-end" width="40px">
        <div class="fw-bold text-dark">نادي إتقان التلاوة</div> 
    </div>

</div>

<br><br>
<hr class="border border-warning border-2 opacity-75">
</header>

<!-- TITLE -->
<section class="container my-4">
    <h1 class="text-dark">استبيان تقييم النادي</h1>
    <p class="text-info">نحن نقدر رأيك لتحسين خدماتنا</p>
</section>

<!-- FORM -->
<section class="container mb-5">

<div class="card p-4">

<form id="surveyForm">

    <!-- NAME -->
    <div class="mb-3 text-end">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" id="name" class="form-control" placeholder="أدخل اسمك">
        <small class="text-danger" id="nameError"></small>
    </div>

    <!-- EMAIL -->
    <div class="mb-3 text-end">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control" placeholder="example@email.com">
        <small class="text-danger" id="emailError"></small>
    </div>

    <!-- AGE -->
    <div class="mb-3 text-end">
        <label class="form-label">العمر</label>
        <input type="number" id="age" class="form-control" placeholder="أدخل عمرك">
        <small class="text-danger" id="ageError"></small>
    </div>

    <!-- RADIO -->
    <div class="mb-3 text-end">
        <label class="form-label">هل أعجبك النادي؟</label><br>
        <input type="radio" name="like" value="yes"> نعم
        <input type="radio" name="like" value="no"> لا
    </div>

    <!-- CHECKBOX -->
    <div class="mb-3 text-end">
        <label class="form-label">ما الذي أعجبك؟</label><br>
        <input type="checkbox" value="teachers"> المعلمون
        <input type="checkbox" value="content"> المحتوى
        <input type="checkbox" value="system"> النظام
    </div>

    <!-- TEXTAREA -->
    <div class="mb-3 text-end">
        <label class="form-label">اقتراحاتك</label>
        <textarea id="message" class="form-control" rows="4"></textarea>
    </div>

    <!-- BUTTONS -->
    <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-info">إرسال</button>
        <button type="reset" class="btn btn-outline-warning">إعادة</button>
    </div>

</form>

</div>

</section>

<!-- JS VALIDATION -->
<script>
/*
    Questionnaire Form Validation
    - validates name, email, age
    - uses regex + conditions
*/

document.getElementById("surveyForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let valid = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let age = document.getElementById("age").value.trim();

    // NAME validation (only letters + Arabic allowed)
    let namePattern = /^[A-Za-z\u0600-\u06FF\s]+$/;
    if (!namePattern.test(name)) {
        document.getElementById("nameError").innerText = "الاسم غير صالح";
        valid = false;
    } else {
        document.getElementById("nameError").innerText = "";
    }

    // EMAIL validation
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        document.getElementById("emailError").innerText = "البريد الإلكتروني غير صحيح";
        valid = false;
    } else {
        document.getElementById("emailError").innerText = "";
    }

    // AGE validation (18 - 60)
    if (age < 18 || age > 60 || age === "") {
        document.getElementById("ageError").innerText = "العمر يجب أن يكون بين 18 و 60";
        valid = false;
    } else {
        document.getElementById("ageError").innerText = "";
    }

    // FINAL CHECK
    if (valid) {
        alert("تم إرسال الاستبيان بنجاح!");
        document.getElementById("surveyForm").reset();
    }
});
</script>

<footer class="mt-5 bg-white">

    <div class="container pb-4">
        <p>© 2026 نادي إتقان التلاوة</p>

            <a href="rules.html" class="text-decoration-none text-secondary">الشروط</a>
        </div>
    </div>
</footer>
</body>
</html>

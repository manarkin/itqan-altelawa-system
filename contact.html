        <!-- Dropdown Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav text-end">

    <hr class="border border-warning border-2 opacity-75">
</header>

<!-- Title Section -->
<section class="container my-5">
    <h1 class="text-primary">تواصل معنا</h1>
    <p class="text-dark">نحن هنا لمساعدتك في أي استفسارات أو مشكلات.</p>
</section>

<!-- Contact Info -->
<div class="container mb-5">
    <div class="d-flex justify-content-center gap-4 flex-wrap">

        <div class="card bg-white shadow p-4" style="width:300px">
            <div class="fs-1">💬</div>
            <h5 class="text-primary">تواصل عبر الواتساب</h5>
            <p class="text-dark">+968 9123 4567</p>
        </div>

        <div class="card bg-white shadow p-4" style="width:300px">
            <div class="fs-1">✉️</div>
            <h5 class="text-primary">البريد الإلكتروني</h5>
            <p class="text-dark">itqan@university.edu</p>
        </div>

    </div>
</div>

<!-- Form -->
<div class="container mb-5">
  <div class="card p-4 shadow">

    <h3 class="mb-4" >نموذج التواصل</h3>

    <form action="https://httpbin.org/get" method="get">

      <div class="mb-3 text-end">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" name="name" class="form-control" required>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" name="phone" class="form-control">
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">نوع الاستفسار</label>
        <select name="type" class="form-select">
          <option>استفسار</option>
          <option>شكوى</option>
          <option>اقتراح</option>
        </select>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">رسالتك</label>
        <textarea name="message" class="form-control" rows="4" required></textarea>
      </div>

      <div class="form-check mb-3 text-end">
        <input type="checkbox" class="form-check-input">
        <label class="form-check-label">الاشتراك في النشرة البريدية</label>
      </div>

      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-info">إرسال</button>
        <button type="reset" class="btn btn-outline-warning">إعادة تعيين</button>
      </div>

    </form>
  </div>
</div>

<div class="mb-5">
  <a href="index.html" class="btn btn-outline-warning">العودة للرئيسية</a>
</div>

            <a href="rules.html" class="text-decoration-none text-secondary">الشروط</a>
        </div>
    </div>
</footer>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<title>اتصل بنا</title>
</head>

<body class="bg-light text-center">

<!-- Header -->
<header class="bg-white">
<div class="container-fluid">

    <nav class="navbar navbar-expand-sm float-start">
        <ul class="nav navbar-tabs">
            <li class="nav-item">
                <a href="about.html" class="nav-link text-secondary fw-bold">حول</a>
            </li>
            <li class="nav-item">
                <a href="index.html" class="nav-link text-secondary fw-bold">الرئيسية</a>
            </li>
        </ul>
    </nav>

    <div class="float-end">
        <img src="logo.png" class="rounded float-end" width="40px">
        <div class="fw-bold text-dark">نادي إتقان التلاوة</div> 
    </div>

</div>

<br><br>
<hr class="border border-warning border-2 opacity-75">
</header>

<!-- Title Section -->
<section class="container my-5">
    <h1 class="text-primary">تواصل معنا</h1>
    <p class="text-dark">نحن هنا لمساعدتك في أي استفسارات أو مشكلات.</p>
</section>

<!-- Contact Info -->
<div class="container mb-5">
    <div class="d-flex justify-content-center gap-4 flex-wrap">

        <div class="card bg-white shadow p-4" style="width:300px">
            <div class="fs-1">💬</div>
            <h5 class="text-primary">تواصل عبر الواتساب</h5>
            <p class="text-dark">+968 9123 4567</p>
        </div>

        <div class="card bg-white shadow p-4" style="width:300px">
            <div class="fs-1">✉️</div>
            <h5 class="text-primary">البريد الإلكتروني</h5>
            <p class="text-dark">itqan@university.edu</p>
        </div>

    </div>
</div>

<!-- Form -->
<div class="container mb-5">
  <div class="card p-4 shadow">

    <h3 class="mb-4" >نموذج التواصل</h3>

    <form action="https://httpbin.org/get" method="get">

      <div class="mb-3 text-end">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" name="name" class="form-control" required>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" name="phone" class="form-control">
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">نوع الاستفسار</label>
        <select name="type" class="form-select">
          <option>استفسار</option>
          <option>شكوى</option>
          <option>اقتراح</option>
        </select>
      </div>

      <div class="mb-3 text-end">
        <label class="form-label">رسالتك</label>
        <textarea name="message" class="form-control" rows="4" required></textarea>
      </div>

      <div class="form-check mb-3 text-end">
        <input type="checkbox" class="form-check-input">
        <label class="form-check-label">الاشتراك في النشرة البريدية</label>
      </div>

      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-info">إرسال</button>
        <button type="reset" class="btn btn-outline-warning">إعادة تعيين</button>
      </div>

    </form>
  </div>
</div>

<div class="mb-5">
  <a href="index.html" class="btn btn-outline-warning">العودة للرئيسية</a>
</div>

<footer class="mt-5 bg-white">
    <hr class="border border-warning border-2 opacity-75 mx-auto">
    <div class="container pb-4">
        <p>© 2026 نادي إتقان التلاوة</p>
        
        <div class="d-flex justify-content-center gap-4">
            <a href="contact.html" class="text-decoration-none text-secondary">اتصل بنا</a>
            <a href="rules.html" class="text-decoration-none text-secondary">الشروط</a>
        </div>
    </div>
</footer>

</body>
</html>

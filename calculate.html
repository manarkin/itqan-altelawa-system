    <!-- Calculator -->
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h3 class="mb-4">حاسبة عدد الحلقات</h3>

        <div class="mb-3">
          <label class="form-label">عدد الطالبات</label>
          <input type="number" id="students" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">عدد المعلمات</label>
          <input type="number" id="teachers" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">الحد الأقصى للطالبات في الحلقة</label>
          <input type="number" id="max" class="form-control" />
        </div>

        <button class="btn btn-warning w-100" onclick="calculate()">
          احسب
        </button>

        <div class="mt-4" id="result"></div>
      </div>
    </div>

    <footer class="mt-5 bg-white">

    <script>
      // function that calculates sessions number based on students number
      function calculate() {
        // get values as text
        let students = document.getElementById("students").value;
        let teachers = document.getElementById("teachers").value;
        let max = document.getElementById("max").value;

        // pattern for positive integers to use it later
        let pattern = /^[1-9]\d*$/;

        // check inputs using pattern matching
        if (
          !pattern.test(students) ||
          !pattern.test(teachers) ||
          !pattern.test(max)
        ) {
          alert("الرجاء إدخال أرقام صحيحة أكبر من صفر"); //alert for invalid input
          return;
        }

        // convert inputs to numbers after validating it as a string
        students = parseInt(students);
        teachers = parseInt(teachers);
        max = parseInt(max);

        // calculate number of sessions and ceil it up
        let sessions = Math.ceil(students / max);

        // calculate the number of remaining students
        let remainder = students % max;

        let message;

        // check if teachers are enough for students
        if (teachers >= sessions) {
          message = " عدد المعلمات كافي";
        } else {
          let needed = sessions - teachers;
          message = "تحتاج إلى " + needed + " معلمة إضافية";
        }

        // display results
        document.getElementById("result").innerHTML =
          "<p>عدد الحلقات: " +
          sessions +
          "</p>" +
          "<p>عدد الطالبات المتبقيات: " +
          remainder +
          "</p>" +
          "<p>" +
          message +
          "</p>";
      }
    </script>

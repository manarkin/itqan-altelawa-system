<!-- Title -->
<section class="container my-4">
  <h1 class="text-dark">شروط التسجيل</h1>
  <p class="text-info">يرجى قراءة الشروط قبل التسجيل</p>
</section>

<!--FORM -->
<section class="container mb-4">
  <div class="card p-3">

    <div class="row g-2">

      <div class="col-lg-5">
        <input id="ruleText" class="form-control" placeholder="أدخل الشرط">
      </div>

      <div class="col-lg-3">
        <button class="btn btn-info w-100" onclick="addRule()">إضافة</button>
      </div>

      <div class="col-lg-4">
        <input id="searchText" class="form-control" placeholder="بحث">
      </div>

    </div>

    <button class="btn btn-outline-warning mt-2" onclick="searchRule()">بحث</button>

  </div>
</section>

<!-- TABLE -->
<section class="container mb-5">

  <table class="table text-center">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>الشرط</th>
      </tr>
    </thead>

    <tbody id="rulesTable">
      <!-- for JS -->
    </tbody>
  </table>

</section>

<!-- JS -->
<script>
/* 1. OBJECT TYPE (Constructor) */
function Rule(id, text) {
    this.id = id;
    this.text = text;
}

/* 2. ARRAY */
let rules = [
    new Rule(1, "أن يكون المتقدم طالبًا أو موظفًا في الجامعة"),
    new Rule(2, "الالتزام بالحضور في المواعيد المحددة"),
    new Rule(3, "الالتزام بالآداب الإسلامية وأنظمة النادي")
];

/* DISPLAY FUNCTION */
function displayRules(data = rules) {
    let table = document.getElementById("rulesTable");
    table.innerHTML = "";

    for (let i = 0; i < data.length; i++) {
        table.innerHTML += `
            <tr>
                <td>${data[i].id}</td>
                <td>${data[i].text}</td>
            </tr>
        `;
    }
}

/* ADD FUNCTION */
function addRule() {
    let text = document.getElementById("ruleText").value;

    if (text.trim() === "") return;

    let newId = rules.length + 1;
    rules.push(new Rule(newId, text));

    document.getElementById("ruleText").value = "";
    displayRules();
}

/* SEARCH FUNCTION */
function searchRule() {
    let query = document.getElementById("searchText").value.toLowerCase();

    let filtered = rules.filter(r =>
        r.text.toLowerCase().includes(query)
    );

    displayRules(filtered);
}

/* INITIAL LOAD */
displayRules();
</script>

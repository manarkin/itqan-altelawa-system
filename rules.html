<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <title>شروط التسجيل — نادي إتقان التلاوة</title>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo.png" alt="شعار النادي" class="logo" />
      <h2 class="title">نادي إتقان التلاوة</h2>
    </div>
    <div class="nav">
      <a href="about.html">حول</a>
      <a href="index.html">الرئيسية</a>
    </div>
  </header>

  <section class="hero rules-hero">
    <div class="rules-wrap">
      <h1 class="rules-title">شروط التسجيل</h1>

      <table class="rules-table" role="table" aria-label="شروط التسجيل">
        <thead>
          <tr>
            <th colspan="2" class="rules-head">يرجى قراءة الشروط قبل إتمام التسجيل</th>
          </tr>
        </thead>
        <tbody>
          <tr class="rule-row">
            <td class="rules-num"><span class="badge">1</span></td>
            <td class="rules-card">
              <p class="rules-text">أن يكون المتقدم حاليًا طالبًا أو موظفًا في الجامعة.</p>
            </td>
          </tr>
          <tr class="rule-row">
            <td class="rules-num"><span class="badge">2</span></td>
            <td class="rules-card">
              <p class="rules-text">الالتزام بالحضور في المواعيد المحددة للحلقات.</p>
            </td>
          </tr>
          <tr class="rule-row">
            <td class="rules-num"><span class="badge">3</span></td>
            <td class="rules-card">
              <p class="rules-text">التحلّي بالآداب الإسلامية والالتزام بأنظمة النادي.</p>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="buttons rules-actions">
        <a href="index.html"><button class="start">العودة للرئيسية</button></a>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 نادي إتقان التلاوة</p>
    <div class="footer-links">
      <a href="contact.html">اتصل بنا</a>
      <a href="#">الشروط</a>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<title>الشروط</title>
</head>

<body class="bg-light text-center">

<!-- Header -->
<header class="bg-white">
<div class="container-fluid">

    <nav class="navbar navbar-expand-sm float-start">
        <ul class="nav navbar-tabs">
            <li class="nav-item"><a href="about.html" class="nav-link text-secondary fw-bold">حول</a></li>
            <li class="nav-item"><a href="index.html" class="nav-link text-secondary fw-bold">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="float-end">
        <img src="logo.png" class="rounded float-end" width="40px">
        <div class="fw-bold text-dark">نادي إتقان التلاوة</div> 
    </div>

</div>

<br><br>
<hr class="border border-warning border-2 opacity-75">
</header>

<!-- Title -->
<section class="container my-4">
  <h1 class="text-dark">شروط التسجيل</h1>
  <p class="text-info">يرجى قراءة الشروط قبل التسجيل</p>
</section>

<!--FORM -->
<section class="container mb-4">
  <div class="card p-3">

    <div class="row g-2">

      <div class="col-lg-5">
        <input id="ruleText" class="form-control" placeholder="أدخل الشرط">
      </div>

      <div class="col-lg-3">
        <button class="btn btn-info w-100" onclick="addRule()">إضافة</button>
      </div>

      <div class="col-lg-4">
        <input id="searchText" class="form-control" placeholder="بحث">
      </div>

    </div>

    <button class="btn btn-outline-warning mt-2" onclick="searchRule()">بحث</button>

  </div>
</section>

<!-- TABLE -->
<section class="container mb-5">

  <table class="table text-center">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>الشرط</th>
      </tr>
    </thead>

    <tbody id="rulesTable">
      <!-- for JS -->
    </tbody>
  </table>

</section>

<!-- JS -->
<script>
/* 1. OBJECT TYPE (Constructor) */
function Rule(id, text) {
    this.id = id;
    this.text = text;
}

/* 2. ARRAY */
let rules = [
    new Rule(1, "أن يكون المتقدم طالبًا أو موظفًا في الجامعة"),
    new Rule(2, "الالتزام بالحضور في المواعيد المحددة"),
    new Rule(3, "الالتزام بالآداب الإسلامية وأنظمة النادي")
];

/* DISPLAY FUNCTION */
function displayRules(data = rules) {
    let table = document.getElementById("rulesTable");
    table.innerHTML = "";

    for (let i = 0; i < data.length; i++) {
        table.innerHTML += `
            <tr>
                <td>${data[i].id}</td>
                <td>${data[i].text}</td>
            </tr>
        `;
    }
}

/* ADD FUNCTION */
function addRule() {
    let text = document.getElementById("ruleText").value;

    if (text.trim() === "") return;

    let newId = rules.length + 1;
    rules.push(new Rule(newId, text));

    document.getElementById("ruleText").value = "";
    displayRules();
}

/* SEARCH FUNCTION */
function searchRule() {
    let query = document.getElementById("searchText").value.toLowerCase();

    let filtered = rules.filter(r =>
        r.text.toLowerCase().includes(query)
    );

    displayRules(filtered);
}

/* INITIAL LOAD */
displayRules();
</script>
<!-- FOOTER -->
<footer class="mt-5 bg-white">
    <hr class="border border-warning border-2 opacity-75 mx-auto">
    <div class="container pb-4">
        <p>© 2026 نادي إتقان التلاوة</p>
        
        <div class="d-flex justify-content-center gap-4">
            <a href="contact.html" class="text-decoration-none text-secondary">اتصل بنا</a>
            <a href="rules.html" class="text-decoration-none text-secondary">الشروط</a>
        </div>
    </div>
</footer>

</body>
</html>

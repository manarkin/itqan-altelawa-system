<head>

<body class="bg-light text-center">

<!-- HEADER -->
<header class="bg-white">
<div class="container-fluid">

    <nav class="navbar navbar-expand-sm float-start">
        <ul class="nav navbar-tabs">
            <li class="nav-item"><a href="about.html" class="nav-link text-secondary fw-bold">حول</a></li>
            <li class="nav-item"><a href="index.html" class="nav-link text-secondary fw-bold">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="float-end">
        <img src="images/logo.png" class="rounded float-end" width="40px">
        <div class="fw-bold text-dark">نادي إتقان التلاوة</div> 
    </div>

</div>

<br><br>
<hr class="border border-warning border-2 opacity-75">
</header>

<!-- TITLE -->
<section class="container my-4">
    <h1 class="text-dark">اختبر معلوماتك في القرآن والتجويد 🎯</h1>
    <p class="text-info">اختر السورة الصحيحة لكل معلومة</p>
</section>

<!-- GAME BOX -->
<section class="container mb-5">

<div class="card p-4">

    <h5 id="question"></h5>

    <div id="options" class="my-3"></div>

    <button class="btn btn-info" onclick="checkAnswer()">تحقق</button>

    <p id="result" class="mt-3 fw-bold"></p>

</div>

</section>

<!-- JS -->
<script>
/*
    Fun Quran & Tajweed Game
    - Shows random question
    - User selects answer
    - Checks correctness
*/

/* QUESTIONS ARRAY */
let questions = [
    {
        fact: "هذه السورة وردت فيها البسملة كجزء من اية",
        options: ["النمل", "الفاتحة", "الإخلاص"],
        answer: "النمل"
    },
    {
        fact: "سورة تُسمى قلب القرآن",
        options: ["يس", "البقرة", "الكهف"],
        answer: "يس"
    },
    {
        fact: "سورة فيها أطول آية في القرآن",
        options: ["البقرة", "آل عمران", "النساء"],
        answer: "البقرة"
    }
];

let currentIndex = 0;

/* SHOW QUESTION FUNCTION */
function showQuestion() {
    let q = questions[currentIndex];

    document.getElementById("question").innerText = q.fact;

    let optionsHTML = "";

    for (let i = 0; i < q.options.length; i++) {
        optionsHTML += `
            <div>
                <input type="radio" name="option" value="${q.options[i]}">
                ${q.options[i]}
            </div>
        `;
    }

    document.getElementById("options").innerHTML = optionsHTML;
}

/* CHECK ANSWER FUNCTION */
function checkAnswer() {
    let q = questions[currentIndex];
    let selected = document.querySelector('input[name="option"]:checked');

    if (!selected) {
        document.getElementById("result").innerText = "اختر إجابة أولاً";
        return;
    }

    if (selected.value === q.answer) {
        document.getElementById("result").innerText = "✔ إجابة صحيحة!";
    } else {
        document.getElementById("result").innerText = "✖ إجابة خاطئة";
    }

    setTimeout(() => {
        currentIndex++;

        if (currentIndex < questions.length) {
            showQuestion();
            document.getElementById("result").innerText = "";
        } else {
            document.getElementById("question").innerText = "انتهى الاختبار 🎉";
            document.getElementById("options").innerHTML = "";
            document.querySelector("button").style.display = "none";
        }
    }, 1000);
}

/* INIT */
showQuestion();
</script>

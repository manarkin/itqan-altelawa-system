<!doctype html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>نادي إتقان التلاوة</title>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row" style="height: 15%"></div>
      <div class="row" style="height: 70%">
        <div class="card" style="width: 400px">
          <img
            src="lock.png"
            alt="logo picture"
            class="card-img rounded-circle mx-auto d-block"
            width="40"
            height="40"
          />
          <div class="card-body">
            <h2 class="text-center">مرحبًا بك مجددًا</h2>
            <p class="text-center">قم بتسجيل الدخول إلى حسابك</p>
            <div class="btn-group">
              <button type="button" class="btn btn-outline-secondary">
                إدارية
              </button>
              <button type="button" class="btn btn-outline-secondary">
                معلمة
              </button>
              <button type="button" class="btn btn-outline-secondary">
                طالبة
              </button>
            </div>
            <form action="">
              <div class="mb-3 mt-3">
                <label for="email">البريدالإلكتروني</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="بريدك الجامعي"
                  name="email"
                />
              </div>
              <div class="mb-3">
                <label for="pwd">كلمة المرور</label>
                <input
                  type="password"
                  class="form-control"
                  placeholder="كلمة المرور"
                  name="pswd"
                />
              </div>
              <button type="submit" class="btn btn-primary">
                تسجيل الدخول
              </button>
            </form>
            <hr />
            <p>
              ليس لديك حساب؟<a href="register.html" class="label">سجل الان</a>
            </p>
          </div>
        </div>
      </div>

      <div class="row" style="height: 15%"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>نادي إتقان التلاوة</title>
  </head>

  <body>
    <div class="container-fluid">
      <header class="bg-white">
        <div class="container-fluid">
          <nav class="navbar navbar-expand-sm navbar-black float-start">
            <ul class="nav navbar-tabs">
              <li class="nav-item">
                <a
                  href="about.html"
                  class="nav-link active text-secondary fw-bold"
                  href="about.html"
                  >حول</a
                >
              </li>
              <li class="nav-item">
                <a
                  href="index.html"
                  class="nav-link active text-secondary fw-bold"
                  href="index.html"
                  >الرئيسية</a
                >
              </li>
            </ul>
          </nav>
          <div class="float-end">
            <img
              src="logo.png"
              alt="شعار النادي"
              class="rounded float-end"
              width="40px"
            />
            <div class="col text-dark fw-bold">نادي إتقان التلاوة</div>
          </div>
        </div>

        <br /><br />
        <hr class="border border-warning border-2 opacity-75" />
      </header>
      <div class="row justify-content-center" style="height: 70%">
        <div
          class="card rounded-5 border-warning border-3 p-4"
          style="width: 400px"
        >
          <img
            src="lock.png"
            alt="logo picture"
            class="mx-auto d-block"
            width="40"
            height="40"
          />
          <div class="card-body">
            <h2 class="text-center text-info">مرحبًا بك مجددًا</h2>
            <p class="text-center">قم بتسجيل الدخول إلى حسابك</p>
            <div class="btn-group d-flex justify-content-center mb-4">
              <button
                type="button"
                class="btn btn-outline-secondary texy text-info"
              >
                إدارية
              </button>
              <button type="button" class="btn btn-outline-secondary text-info">
                معلمة
              </button>
              <button type="button" class="btn btn-outline-secondary text-info">
                طالبة
              </button>
            </div>
            <form action="">
              <div class="mb-4 mt-3">
                <label for="email" class="text-warning">البريدالإلكتروني</label>
                <input
                  type="email"
                  class="form-control border-warning border-2"
                  placeholder="بريدك الجامعي"
                  name="email"
                />
              </div>
              <div class="mb-3">
                <label for="pwd" class="text-warning">كلمة المرور</label>
                <input
                  type="password"
                  class="form-control border-warning border-2"
                  placeholder="كلمة المرور"
                  name="pswd"
                />
              </div>
              <button type="submit" class="btn btn-info text-white rounded-3">
                تسجيل الدخول
              </button>
            </form>
            <hr class="border-warning border-5" />
            <p>
              ليس لديك حساب؟<a href="register.html" class="label text-warning"
                >سجل الان</a
              >
            </p>
          </div>
        </div>
      </div>

      <footer class="mt-5 bg-white">
        <hr class="border border-warning border-2 opacity-75 mx-auto" />
        <div class="container pb-4">
          <p class="mb-3">© 2026 نادي إتقان التلاوة</p>

          <div class="d-flex justify-content-center gap-4">
            <a href="contact.html" class="text-decoration-none text-secondary"
              >اتصل بنا</a
            >
            <a href="#" class="text-decoration-none text-secondary">الشروط</a>
          </div>
        </div>
        <br />
      </footer>
    </div>
  </body>
</html>

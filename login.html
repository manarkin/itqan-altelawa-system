            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Dropdown Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav text-end">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active text-secondary fw-bold">الرئيسية</a>

<!-- Login Form -->
<section>
  <div class="row justify-content-center" style="height: 70%">
    <div
      class="card rounded-5 border-warning border-3 p-4"
      style="width: 400px"
    >
      <img
        src="images/lock.png"
        alt="logo picture"
        class="mx-auto d-block"
        width="40"
        height="40"
      />
      <div class="card-body">
        <h2 class="text-center text-info">مرحبًا بك مجددًا</h2>
        <p class="text-center">قم بتسجيل الدخول إلى حسابك</p>
        <div class="btn-group d-flex justify-content-center mb-4">
          <button
            type="button"
            class="btn btn-outline-secondary texy text-info"
          >
            إدارية
          </button>
          
          <a href="teacher_page.html" class="btn btn-outline-secondary text-info">
            معلمة
      
          </a>


          <a href="student_page.html" class="btn btn-outline-secondary text-info">
            طالبة
          </a>
        </div>
        <form action="">
          <div class="mb-4 mt-3">
            <label for="email" class="text-warning">البريدالإلكتروني</label>
            <input
              type="email"
              class="form-control border-warning border-2"
              placeholder="بريدك الجامعي"
              name="email"
            />
          </div>
          <div class="mb-3">
            <label for="pwd" class="text-warning">كلمة المرور</label>
            <input
              type="password"
              class="form-control border-warning border-2"
              placeholder="كلمة المرور"
              name="pswd"
            />
          </div>
          <button type="submit" class="btn btn-info text-white rounded-3">
            تسجيل الدخول
          </button>
        </form>
        <hr class="border-warning border-5" />
        <p>
          ليس لديك حساب؟<a href="register.html" class="label text-warning"
            >سجل الان</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
</section>

<footer class="mt-5 bg-white text-center">

        <div class="d-flex justify-content-center gap-4">

        </div>
        
    </div>

<form id="loginForm" action="">
  <div class="mb-4 mt-3">
    <label for="email" class="text-warning">البريد الإلكتروني</label>
    <input
      type="email"
      id="email"
      class="form-control border-warning border-2"
      placeholder="s123456@student.squ.edu.om"
      name="email"
    />
  </div>

  <div class="mb-4">
    <label for="phone" class="text-warning">رقم الهاتف</label>
    <input
      type="text"
      id="phone"
      class="form-control border-warning border-2"
      placeholder="9xxxxxxx"
      name="phone"
    />
  </div>

  <div class="mb-3">
    <label for="pswd" class="text-warning">كلمة المرور</label>
    <input
      type="password"
      id="pswd"
      class="form-control border-warning border-2"
      placeholder="كلمة المرور"
      name="pswd"
    />
  </div>

  <button type="submit" class="btn btn-info text-white rounded-3">
    تسجيل الدخول
  </button>
</form>
        <hr class="border-warning border-5" />

<script>
  const form = document.getElementById('loginForm');

  form.addEventListener('submit', function(event) {
    // Prevent the form from submitting immediately
    event.preventDefault();

    // Get input values
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const pswd = document.getElementById('pswd').value;

    // Pattern: s + 6 digits + domain
    const emailPattern = /^s\d{6}@student\.squ\.edu\.om$/;
    
    // Pattern: Starts with 9 or 7, followed by 7 digits (total 8)
    const phonePattern = /^[97]\d{7}$/;

    // Validation checks
    if (!emailPattern.test(email)) {
      alert("البريد الإلكتروني غير صحيح");
      return;
    }

    if (!phonePattern.test(phone)) {
      alert("الرقم غير صحيح");
      return;
    }

    if (pswd.length < 8) {
      alert("يجب أن تتكون كلمة المرور من 8 رموز");
      return;
    } 

    // If all ok pass
    alert("تم إرسال بياناتك بنجاح");
  }); 
</script>

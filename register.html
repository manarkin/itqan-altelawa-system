<script>
document.getElementById('regForm'); 

regForm.addEventListener('submit', function(event) {
    event.preventDefault(); 

    clearErrors(); // remove any old error messages let ok = true;
    const role = document.getElementById('role').value; 
    const firstName= document.getElementById('firstName').value.trim(); 
    const email = document.getElementById('email').value.trim(); 
    const phone = document.getElementById('phone').value.trim(); 
    const password = document.getElementById('password').value; 
    const confirm = document.getElementById('confirm').value; 

    // 1. Role check 
    if (role === '') {
      showError('role', 'Please select student or teacher'); 
    ok = false; } 
    
    // 2. First name:letters only, min 2 chars 
    if (!/^[A-Za-z\u0600-\u06FF\s]{2,}$/.test(firstName)) {
      showError('firstName', 'Name must be at least 2 letters'); ok = false; 
    }

    // 3. SQU email pattern 
    const emailPat = /^s\d{6}@student\.squ\.edu\.om$/; 
    if (!emailPat.test(email)) {
      showError('email', 'Must be: s123456@student.squ.edu.om'); ok = false; 
    }
    
    // 4. Oman phone: starts with 9 or 7, 8 digits total 
    if (!/^[97]\d{7}$/.test(phone)) {
      showError('phone', 'Phone must start with 9 or 7 and be 8 digits'); 
    ok = false; 
    } 
    
    // 5.Password length 
    if (password.length < 8) {
      showError('password', 'Password must be at least 8 characters');
      ok = false; 
    } 
    
    // 6. Passwords match 
    if (password !== confirm) {
      showError('confirm', 'Passwords do not match'); 
    ok = false;   
    }

    if (ok) {
    alert('Registration data validated! Submitting...'); 
    regForm.submit(); 
    } 
  }
); 
  
// Shows a red error message below a field 
function showError(fieldId, msg) { 
  const field = document.getElementById(fieldId); 
  const err = document.createElement('div');
  err.className = 'text-danger small mt-1 reg-error'; 
  err.textContent = msg;
  field.parentNode.appendChild(err); 
  field.classList.add('is-invalid'); 
} 

// Removes all previous errors 
function clearErrors() {
document.querySelectorAll('.reg-error').forEach(e => e.remove());
document.querySelectorAll('.is-invalid').forEach(e => e.classList.remove('is-invalid'));
}
</script>

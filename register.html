<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>إنشاء حساب — نادي إتقان التلاوة</title>
  </head>
  <body>
    <header class="bg-white">
      <div class="container-fluid">
        <nav class="navbar navbar-expand-sm navbar-black float-start">
          <ul class="nav navbar-tabs">
            <li class="nav-item">
              <a
                href="about.html"
                class="nav-link active text-secondary fw-bold"
                href="about.html"
                >حول</a
              >
            </li>
            <li class="nav-item">
              <a
                href="index.html"
                class="nav-link active text-secondary fw-bold"
                href="index.html"
                >الرئيسية</a
              >
            </li>
          </ul>
        </nav>
        <div class="float-end">
          <img
            src="logo.png"
            alt="شعار النادي"
            class="rounded float-end"
            width="40px"
          />
          <div class="col text-dark fw-bold">نادي إتقان التلاوة</div>
        </div>
      </div>

      <br /><br />
      <hr class="border border-warning border-2 opacity-75" />
    </header>

    <section class="container py-5">
      <div class="d-flex justify-content-center">
        <div
          class="card rounded-5 border-warning border-3 p-4 shadow-sm"
          style="max-width: 600px; width: 100%"
        >
          <div class="card-body text-center">
            <h1 id="regTitle" class="text-info fw-bold display-5 mb-2">
              إنشاء حساب
            </h1>
            <div class="text-muted mb-4">انضم إلى نادي إتقان التلاوة</div>

            <form dir="rtl" class="text-end">
              <div class="mb-3">
                <label class="form-label text-warning fw-bold" for="role"
                  >طالبة/معلمة <span class="text-danger">*</span></label
                >
                <select
                  id="role"
                  name="role"
                  class="form-select rounded-pill border-warning"
                  required
                >
                  <option value="" disabled selected>اختر</option>
                  <option value="student">طالبة</option>
                  <option value="teacher">معلمة</option>
                </select>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="firstName"
                    >اسمك <span class="text-danger">*</span></label
                  >
                  <input
                    id="firstName"
                    name="firstName"
                    class="form-control rounded-pill border-warning"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="lastName"
                    >اسم الأب <span class="text-danger">*</span></label
                  >
                  <input
                    id="lastName"
                    name="lastName"
                    class="form-control rounded-pill border-warning"
                    required
                  />
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="tribe"
                    >القبيلة <span class="text-danger">*</span></label
                  >
                  <input
                    id="tribe"
                    name="tribe"
                    class="form-control rounded-pill border-warning"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="email"
                    >البريد الإلكتروني <span class="text-danger">*</span></label
                  >
                  <input
                    id="email"
                    type="email"
                    name="email"
                    class="form-control rounded-pill border-warning"
                    placeholder="البريد الجامعي"
                    required
                  />
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="phone"
                    >رقم الهاتف</label
                  >
                  <input
                    id="phone"
                    name="phone"
                    class="form-control rounded-pill border-warning"
                    placeholder="+968"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="level"
                    >المرحلة</label
                  >
                  <select
                    id="level"
                    name="level"
                    class="form-select rounded-pill border-warning"
                  >
                    <option value="">اختر المستوى</option>
                    <option value="beginner">مبتدئة</option>
                    <option value="intermediate">تمهيدية</option>
                  </select>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="college"
                    >الكلية</label
                  >
                  <select
                    id="college"
                    name="college"
                    class="form-select rounded-pill border-warning"
                  >
                    <option value="">اختر</option>
                    <option value="sci">العلوم</option>
                    <option value="edu">التربية</option>
                    <option value="low">الحقوق</option>
                    <option value="agri">الزراعة</option>
                    <option value="eng">الهندسة</option>
                    <option value="edu">الآداب والعلوم الاجتماعية</option>
                    <option value="edu">الاقتصاد والعلوم السياسية</option>
                    <option value="edu">الطب والعوم الصحية</option>
                    <option value="edu">التمريض</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="group"
                    >الدفعة</label
                  >
                  <select
                    id="group"
                    name="group"
                    class="form-select rounded-pill border-warning"
                  >
                    <option value="">اختر</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                  </select>
                </div>
              </div>

              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="password"
                    >كلمة المرور <span class="text-danger">*</span></label
                  >
                  <input
                    id="password"
                    type="password"
                    name="password"
                    class="form-control rounded-pill border-warning"
                    placeholder="••••••••"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-warning fw-bold" for="confirm"
                    >تأكيد كلمة المرور <span class="text-danger">*</span></label
                  >
                  <input
                    id="confirm"
                    type="password"
                    name="confirm"
                    class="form-control rounded-pill border-warning"
                    placeholder="••••••••"
                    required
                  />
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label text-warning fw-bold" for="idPic"
                  >صورة البطاقة الجامعية</label
                >
                <input
                  type="file"
                  id="idPic"
                  name="idPic"
                  class="form-control rounded-3 border-warning"
                  accept="image/*"
                />
              </div>

              <button
                type="submit"
                class="btn btn-info text-white w-100 rounded-pill py-2 fw-bold"
              >
                إتمام التسجيل
              </button>

              <hr class="my-4" />

              <p class="text-center">
                لديك حساب بالفعل؟
                <a
                  href="Login.html"
                  class="text-info text-decoration-none fw-bold"
                  >تسجيل الدخول</a
                >
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>

    <footer class="mt-5 bg-white">
      <hr class="border border-warning border-2 opacity-75 mx-auto" />
      <div class="container pb-4">
        <p class="mb-3">© 2026 نادي إتقان التلاوة</p>

        <div class="d-flex justify-content-center gap-4">
          <a href="contact.html" class="text-decoration-none text-secondary"
            >اتصل بنا</a
          >
          <a href="#" class="text-decoration-none text-secondary">الشروط</a>
        </div>
      </div>
      <br />
    </footer>
  </body>
</html>
